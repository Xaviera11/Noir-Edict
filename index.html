<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurelius – Name & Destiny Oracle</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts: Cinzel + Cormorant Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <!-- LOAD NAME DATABASE FIRST -->
    <script src="names.js"></script>
    <!-- THEN MAIN SCRIPT -->
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>AURELIUS</h1>
                <div class="panther-mark"></div>
            </div>
            <p class="tagline">Unlock the meaning, origin &amp; destiny of your name</p>
        </header>

        <main>
            <div class="hero-section">
                <!-- Sleek Panther -->
                <div class="character">
                    <div class="aurelius-panther"></div>
                </div>

                <!-- Search -->
                <div class="search-container">
                    <h2>What's Your True Name?</h2>
                    <div class="search-box">
                        <input type="text" id="fullName" placeholder="Enter your full name..." />

                        <div class="gender-select">
                            <label>
                                <input type="radio" name="gender" value="female" checked />
                                Female
                            </label>
                            <label>
                                <input type="radio" name="gender" value="male" />
                                Male
                            </label>
                        </div>

                        <div class="birthdate">
                            <input type="date" id="birthDate" />
                            <small>Optional – Life Path Number &amp; Star Sign</small>
                        </div>

                        <button onclick="revealPath()">Reveal Your Path</button>
                    </div>

                    <div id="result" class="result-box">
                        <p class="placeholder">
                            Your divine reading will appear here.
                        </p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Your name is your first gift – let it speak your destiny</p>
        </footer>
    </div>
</body>
</html>
